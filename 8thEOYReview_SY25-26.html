    function loadQuestion() {

        if (currentIndex in userResults) return;

        const correct = correctAnswers[currentIndex];
        const isCorrect = (selected === correct);

            btn.classList.add('correct');
            userResults[currentIndex] = true;
            score++;
            updateScore();
            document.getElementById('feedback').innerHTML = `<span style="color:green">Correct! ✨</span><br><span class="rationale-text"><strong>Rationale:</strong> ${rationales[currentIndex]}</span>`;

            userResults[currentIndex] = false;

        }
        
        document.getElementById('feedback').style.display = "block";
        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    }

    }
    
    function prevQ() { 
        if (currentIndex > 0) { currentIndex--; loadQuestion(); } 
    }
