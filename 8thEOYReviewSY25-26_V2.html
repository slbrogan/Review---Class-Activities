<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>8th Grade Math Review</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eceff1; display: flex; justify-content: center; padding: 40px; }
        .quiz-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 700px; text-align: center; }
        .score-box { color: #005088; font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; text-align: right; }
        img { max-width: 100%; border: 1px solid #ddd; margin-bottom: 20px; border-radius: 8px; min-height: 200px; background: #f9f9f9; }
        input { width: 60%; padding: 12px; font-size: 18px; border: 2px solid #005088; border-radius: 8px; outline: none; }
        button { padding: 12px 25px; font-size: 18px; background: #005088; color: white; border: none; border-radius: 8px; cursor: pointer; margin-left: 10px; }
        button:disabled { background: #ccc !important; cursor: not-allowed; }
        #feedback { margin-top: 20px; font-weight: bold; min-height: 24px; line-height: 1.6; text-align: left; padding: 15px; background: #f0f4f7; border-radius: 8px; display: none; }
        .nav-btns { margin-top: 30px; display: flex; justify-content: space-between; }
        .rationale-text { font-weight: normal; color: #444; font-size: 0.95rem; display: block; margin-top: 5px; border-top: 1px solid #ccc; padding-top: 5px; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="score-box" id="score">correct: 0 / 57</div>
    
    <div id="quiz-content">
        <img id="question-img" src="" alt="Question Image">
        <div>
            <input type="text" id="answer-input" placeholder="Enter answer...">
            <button id="submit-btn" onclick="checkAnswer()">Submit</button>
        </div>
        <div id="feedback"></div>
    </div>

    <div class="nav-btns">
        <button onclick="prevQ()" style="background:#607d8b">Previous</button>
        <span id="q-tracker">Question 1 of 57</span>
        <button onclick="nextQ()" style="background:#607d8b">Next</button>
    </div>
</div>

    const correctAnswers = [
        "B, C, D", "blue (GF)", "A, C", "orange", "FE", "C", "∠P", "B and C", "(1, -2)", "Translate to the right", "B", "(-4, 3)", "B", "C", "A, B, D", "No", "10", "Translate 6 units right and 10 units down", "(-2, -6)", "C", "(3, -4)", "A, C, D", "(-2, 3)", "No", "12", "(-2, -6)", "A, B, C", "B", "C", "(-4, 3)", "B", "C", "A, B, D", "No", "10", "Translate 6 units right and 10 units down", "(-2, -6)", "A, B, C", "C", "(-4, 3)", "B", "C", "A, B, D", "No", "10", "Translate 6 units right and 10 units down", "(-2, -6)", "A, B, C", "C", "(-4, 3)", "B", "C", "A, B, D", "No", "10", "Translate 6 units right and 10 units down", "10"

    const rationales = [
        "Figure 2 is a translation (slide) of Figure 1. In rigid motions, we track corresponding parts: side AC maps to the blue segment.",
        "When two shapes are congruent, their parts match up. Segment BC corresponds exactly to segment GF in the second triangle.",
        "A reflection over the y-axis creates a mirror image. This means angle ABC matches (corresponds to) angle HIJ.",
        "By looking at the position of the vertices, angle DEA corresponds to the orange vertex (G) in the second figure.",
        "Parallel lines stay the same distance apart. Segment FE is parallel to HG because they have the same slope.",
        "To stop lines from being parallel, you must change the slope of one. Rotating a line changes its direction.",
        "In congruent figures, corresponding angles are equal. Angle D is in the same relative position as Angle P.",
        "Translations (slides) and rotations (turns) are rigid motions. They change a figure's position but never its size.",

        "Reflections preserve congruency, but they reverse the orientation—making a mirror image.",

        "When you reflect over the x-axis, the x-value stays same but the y-value flips signs. (3, 4) -> (3, -4).",
        "Rigid motions like translation keep the figure's size, interior angles, and area exactly the same.",
        "Reflecting A(2, 3) over the y-axis flips the horizontal position. The x changes from 2 to -2.",

        "Translations move a shape but do not stretch it. Side A'B' stays 12 units.",

        "A 180-degree rotation turns the figure upside down. Orientation changes, but it stays congruent.",
        "To find the image after a y-axis reflection, change the sign of the x-coordinate.",
        "Reflection across the y-axis moves point B from the right side (4, 3) to the left side (-4, 3).",
        "Figure B is the vertical reflection, which means it was flipped over the x-axis.",
        "A translation moves a figure without changing its orientation. It stays 'upright'.",
        "Reflections are rigid motions that preserve size, even though they create a mirror image.",

    let currentIndex = 0;
    let score = 0;
    let userResults = {}; 

    function loadQuestion() {
        const imgElement = document.getElementById('question-img');
        const feedback = document.getElementById('feedback');
        const input = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');

        imgElement.src = `https://drive.google.com/thumbnail?id=${imageIds[currentIndex]}&sz=w1000`;
        document.getElementById('q-tracker').innerText = `Question ${currentIndex + 1} of 57`;
        input.value = "";

        if (currentIndex in userResults) {
            input.disabled = true;
            submitBtn.disabled = true;
            feedback.style.display = "block";
            const wasCorrect = userResults[currentIndex];
            if (wasCorrect) {
                feedback.innerHTML = `<span style="color:green">Correct! ✨</span><br><strong>Answer:</strong> ${correctAnswers[currentIndex]}<br><span class="rationale-text"><strong>Rationale:</strong> ${rationales[currentIndex]}</span>`;
            } else {
                feedback.innerHTML = `<span style="color:red">Completed (Incorrect)</span><br><span class="rationale-text"><strong>Review Rationale:</strong> ${rationales[currentIndex]}</span>`;
            }
        } else {
            input.disabled = false;
            submitBtn.disabled = false;
            feedback.style.display = "none";
        }
    }

    function checkAnswer() {
        if (currentIndex in userResults) return;

        let userRaw = document.getElementById('answer-input').value.toUpperCase().trim();
        let feedback = document.getElementById('feedback');
        let targetAnsRaw = correctAnswers[currentIndex].toUpperCase();
        
        feedback.style.display = "block";
        let isCorrect = false;

        // Simple check: Clean strings and compare
        let cleanedUser = userRaw.replace(/[\s,()]/g, "");
        let cleanedTarget = targetAnsRaw.replace(/[\s,()]/g, "");

        if (cleanedUser === cleanedTarget || targetAnsRaw.includes(userRaw)) {
            isCorrect = true;
        }

        if (isCorrect) {
            userResults[currentIndex] = true;
            score++;
            updateScore();
            feedback.innerHTML = `<span style="color:green">Correct! ✨</span><br><span class="rationale-text"><strong>Rationale:</strong> ${rationales[currentIndex]}</span>`;
            setTimeout(() => { nextQ(); }, 1500);
        } else {
            userResults[currentIndex] = false;
            feedback.innerHTML = `<span style="color:red">Incorrect.</span><br><strong>Correct Answer:</strong> ${correctAnswers[currentIndex]}<br><span class="rationale-text"><strong>Rationale:</strong> ${rationales[currentIndex]}</span>`;
        }
    }

    function updateScore() { document.getElementById('score').innerText = `correct: ${score} / 57`; }
    
    function nextQ() { 
        if (currentIndex < 56) { 
            currentIndex++; 
            loadQuestion(); 
        } else { 
            alert("Final Score: " + score + " / 57"); 
        } 
    }
    
    function prevQ() { 
        if (currentIndex > 0) { 
            currentIndex--; 
            loadQuestion(); 
        } 
    }

    document.getElementById("answer-input").addEventListener("keypress", (e) => { if (e.key === "Enter") checkAnswer(); });
    loadQuestion();
</script>
</body>
</html>
