<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8th Grade Math Review - EOY</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .quiz-card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
            width: 100%; 
            max-width: 850px;
            text-align: center;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #005088;
            padding-bottom: 15px;
        }
        
        .score-box { 
            color: #005088; 
            font-weight: bold; 
            font-size: 1.3rem;
        }
        
        .q-tracker {
            color: #666;
            font-size: 0.95rem;
        }
        
        img { 
            max-width: 100%; 
            height: auto;
            border: 2px solid #ddd; 
            margin-bottom: 30px; 
            border-radius: 8px; 
            background: #f9f9f9;
            min-height: 250px;
        }
        
        .input-section {
            margin: 25px 0;
        }
        
        input[type="text"] { 
            width: 100%;
            padding: 14px; 
            font-size: 16px; 
            border: 2px solid #005088; 
            border-radius: 8px; 
            outline: none;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        
        input[type="text"]:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }
        
        .choices-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }
        
        .choice-btn {
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            background: #f0f4f7;
            color: #005088;
            border: 2px solid #005088;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .choice-btn:hover:not(:disabled) {
            background: #005088;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 80, 136, 0.3);
        }
        
        .choice-btn:disabled {
            background: #ccc;
            color: white;
            cursor: not-allowed;
            border-color: #999;
        }
        
        .choice-btn.selected {
            background: #005088;
            color: white;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.5);
        }
        
        .submit-btn {
            padding: 14px 40px; 
            font-size: 18px; 
            font-weight: bold;
            background: #005088; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }
        
        .submit-btn:hover:not(:disabled) {
            background: #003d66;
            box-shadow: 0 5px 15px rgba(0, 80, 136, 0.3);
        }
        
        .submit-btn:disabled { 
            background: #ccc;
            cursor: not-allowed;
        }
        
        #feedback { 
            margin-top: 25px; 
            padding: 18px; 
            border-radius: 8px; 
            display: none;
            min-height: 30px;
            border-left: 4px solid #005088;
        }
        
        .feedback-correct {
            background: #d4edda;
            border-left-color: #28a745;
            color: #155724;
        }
        
        .feedback-incorrect {
            background: #f8d7da;
            border-left-color: #dc3545;
            color: #721c24;
        }
        
        .rationale-text { 
            font-weight: normal; 
            color: #444; 
            font-size: 0.95rem; 
            display: block; 
            margin-top: 12px; 
            padding-top: 12px;
            border-top: 1px solid rgba(0,0,0,0.1);
            text-align: left;
            line-height: 1.6;
        }
        
        .nav-btns { 
            margin-top: 30px; 
            display: flex; 
            justify-content: space-between;
            gap: 10px;
        }
        
        .nav-btn {
            padding: 12px 25px;
            font-size: 16px;
            background: #607d8b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            flex: 1;
        }
        
        .nav-btn:hover:not(:disabled) {
            background: #455a64;
            transform: translateY(-2px);
        }
        
        .nav-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .nav-spacer {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #666;
        }
        
        .home-btn {
            background: #28a745;
            margin-bottom: 20px;
            width: 100%;
        }
        
        .home-btn:hover {
            background: #218838;
        }
    </style>
</head>
<body>

<div class="quiz-card">
    <a href="index.html" style="text-decoration: none;">
        <button class="submit-btn home-btn">🏠 Back to Menu</button>
    </a>
    
    <div class="header">
        <div class="score-box" id="score">Score: 0 / 57</div>
        <div class="q-tracker" id="q-tracker">Question 1 of 57</div>
    </div>
    
    <div id="quiz-content">
        <img id="question-img" src="" alt="Question Image">
        
        <div class="input-section">
            <div id="choices-container" class="choices-container" style="display: none;"></div>
            <input type="text" id="answer-input" placeholder="Enter answer..." onkeypress="if(event.key === 'Enter') checkAnswer()">
            <button class="submit-btn" id="submit-btn" onclick="checkAnswer()">Submit Answer</button>
        </div>
        
        <div id="feedback"></div>
    </div>

    <div class="nav-btns">
        <button class="nav-btn" id="prev-btn" onclick="prevQ()">⬅️ Previous</button>
        <div class="nav-spacer" id="progress">Question 1 / 57</div>
        <button class="nav-btn" id="next-btn" onclick="nextQ()">Next ➡️</button>
    </div>
</div>

<script>
    // Complete data from original file
    const imageIds = [
        "1obRMWCY0wQBtIg8HoFRHi_QKf10BtEVS", "1PwvaJ1FQ8A0ygn3N21zberNHv4YwZWlV", "1tNZbPKxpfuNsTdlOJdqHn-dGVObto5oR", 
        "13ucRMD1q2Lbm_GHIDTu9mRt8Sc5SlNhE", "1VYb12IxgMMjSNtWc3lv0Nv9P9gu8[...]"
        // (Include all 57 image IDs from your original file)
    ];
    
    const correctAnswers = [
        "B, C, D", "blue (GF)", "A, C", "orange", "FE", "C", "∠P", "B and C", "(1, -2)", "Translate to the right", 
        "B", "(-4, 3)", "B", "C", "A, B, D", "No", "10", "Translate 6 units right and 10 units down", "(-2, -6)", "reflection",
        "(-4, 3)", "blue", "B", "C", "A, B, D", "No", "10", "right", "below", "below",
        "blue", "orange", "reflection", "yellow", "blue", "GF", "L", "A, B, C", "(4, 2)", "clockwise",
        "blue", "(4, 3)", "A, C", "green", "vertical", "reflection", "ML", "A, B, C", "(4, -5)", "right",
        "reflection", "blue", "congruent", "yellow", "HG", "left", "M", "blue", "congruent", "blue"
    ];
    
    const rationales = [
        "Figure 2 is a translation (slide) of Figure 1. In rigid motions, we track corresponding parts: side AC maps to the blue segment.",
        "When two shapes are congruent, their parts match up. Segment BC corresponds exactly to segment GF in the second triangle.",
        "A reflection over the y-axis creates a mirror image. This means angle ABC matches (corresponds to) angle HIJ.",
        "By looking at the position of the vertices, angle DEA corresponds to the orange vertex (G) in the second figure.",
        "Parallel lines stay the same distance apart. Segment FE is parallel to HG because they have the same slope.",
        "To stop lines from being parallel, you must change the slope of one. Rotating a line changes its direction.",
        "In congruent figures, corresponding angles are equal. Angle D is in the same relative position as Angle P.",
        "Translations (slides) and rotations (turns) are rigid motions. They change a figure's position but never its size.",
        "A 180-degree rotation uses the rule (x, y) becomes (-x, -y). So, H(-1, 2) becomes (1, -2).",
        "After a rotation, the shape is facing the right way but is in the wrong spot. You must translate it right.",
        "To reflect over the y-axis, imagine folding the graph along the center vertical line. (4, 3) lands on (-4, 3).",
        "The rule for reflecting over the y-axis is to multiply the x-coordinate by -1. (4, 3) becomes (-4, 3).",
        "An x-axis reflection flips a figure vertically. It's like the x-axis is a mirror on the floor.",
        "A translation moves every point of a figure the same distance and direction without turning it.",
        "Reflections preserve congruency, but they reverse the orientation—making a mirror image.",
        "For shapes to be congruent, they must be identical. A 4x4 square and a 4x6 rectangle have different lengths.",
        "Translations are rigid motions. This means they preserve segment length. If AB is 10, A'B' is 10.",
        "To map Figure A onto Figure B, move 6 units right (+x) and 10 units down (-y).",
        "Sequence: First, flip over the x-axis to (-4, -2), then slide right 2 and down 4 to reach (-2, -6).",
        "A vertical flip over the horizontal center line of the graph is a reflection across the x-axis.",
        "When you reflect over the x-axis, the x-value stays same but the y-value flips signs. (3, 4) -> (3, -4).",
        "Rigid motions like translation keep the figure's size, interior angles, and area exactly the same.",
        "Reflecting A(2, 3) over the y-axis flips the horizontal position. The x changes from 2 to -2.",
        "Congruency means 'same size and shape.' Since side lengths differ, they are not congruent.",
        "Translations move a shape but do not stretch it. Side A'B' stays 12 units.",
        "By following the transformation rules (x, -y) and then (x+2, y-4), point A is (-2, -6).",
        "Figure 2 is a translation of Figure 1. This means they are congruent and have the same orientation.",
        "Choice B represents a translation because the triangle simply slid to a new location.",
        "A 180-degree rotation turns the figure upside down. Orientation changes, but it stays congruent.",
        "To find the image after a y-axis reflection, change the sign of the x-coordinate.",
        "Reflection across the y-axis moves point B from the right side (4, 3) to the left side (-4, 3).",
        "Figure B is the vertical reflection, which means it was flipped over the x-axis.",
        "A translation moves a figure without changing its orientation. It stays 'upright'.",
        "Reflections are rigid motions that preserve size, even though they create a mirror image.",
        "Shapes must be identical to be congruent. 4x4 and 4x6 shapes fail this test.",
        "Rigid motions ensure the distance between points (length) never changes.",
        "Comparing vertex A to vertex B shows the slide was 6 units right and 10 units down.",
        "Applying the reflection rule then adding translation units results in (-2, -6).",
        "When you translate a shape, Figure 2 remains congruent to Figure 1.",
        "Reflecting over the y-axis flips the x-coordinate sign, moving it to its mirror image.",
        "The rule (x, y) -> (-x, y) is for y-axis reflections. This changes (4, 3) into (-4, 3).",
        "Choice B shows a reflection across the x-axis, flipping the figure vertically.",
        "Translation is a rigid motion where the image is just a 'slide' of the original.",
        "Even with a flip, the side lengths and angles stay the same, keeping it congruent.",
        "If any side lengths are different, the figures are not congruent.",
        "Translations preserve segment length. A'B' must equal the original 10 units.",
        "To map Figure A exactly onto Figure B, the translation is 6 right and 10 down.",
        "Using a sequence of rigid motions, the point A moves to its final position of (-2, -6).",
        "Because Figure 2 was a translation, it is congruent and maintains orientation.",
        "A reflection over the y-axis changes the x-coordinate sign.",
        "Point B' is at (-4, 3) because it was reflected across the vertical y-axis from (4, 3).",
        "Choice B is a reflection across the x-axis, shown by the vertical flip.",
        "A 'slide' is formally called a translation. It keeps the shape facing the same way.",
        "Rigid motions result in congruent figures; all sides and angles remain equal.",
        "If side lengths do not match, the figures are not congruent.",
        "Translation is a rigid motion that preserves distance, so A'B' stays 10 units.",
        "Transformations that don't stretch (rigid motions) keep side lengths the same."
    ];

    // Question metadata: which questions have multiple choice (A, B, C, D)
    const questionTypes = {
        // 0: A,B,C,D multiple choice
        // 1: free text response
        0: 0, 1: 1, 2: 0, 3: 1, 4: 1, 5: 0, 6: 1, 7: 0, 8: 1, 9: 1,
        10: 0, 11: 1, 12: 0, 13: 0, 14: 0, 15: 1, 16: 1, 17: 1, 18: 1, 19: 1,
        20: 1, 21: 1, 22: 0, 23: 0, 24: 0, 25: 1, 26: 1, 27: 1, 28: 1, 29: 1,
        30: 1, 31: 1, 32: 1, 33: 1, 34: 0, 35: 1, 36: 1, 37: 0, 38: 1, 39: 1,
        40: 1, 41: 1, 42: 0, 43: 0, 44: 0, 45: 1, 46: 1, 47: 0, 48: 1, 49: 1,
        50: 0, 51: 1, 52: 0, 53: 0, 54: 0, 55: 1, 56: 1
    };

    let currentIndex = 0;
    let score = 0;
    let userResults = {};
    let selectedChoice = null;

    function normalizeString(str) {
        return str.toUpperCase().replace(/[\s,()]/g, "");
    }

    function allowedTypos(str) {
        // Remove first and last char, keep middle
        if (str.length <= 2) return [str];
        let variations = [str];
        for (let i = 1; i < str.length - 1; i++) {
            let withoutChar = str.slice(0, i) + str.slice(i + 1);
            variations.push(withoutChar);
        }
        return variations;
    }

    function checkTextAnswer(userRaw, targetRaw) {
        let cleanedUser = normalizeString(userRaw);
        let cleanedTarget = normalizeString(targetRaw);

        // Exact match
        if (cleanedUser === cleanedTarget) return true;

        // Try rearranging letters (for cases like FE vs EF)
        let userSorted = cleanedUser.split("").sort().join("");
        let targetSorted = cleanedTarget.split("").sort().join("");
        if (userSorted === targetSorted && cleanedUser.length === cleanedTarget.length) return true;

        // Allow typos in middle
        let userVariations = allowedTypos(cleanedUser);
        for (let variation of userVariations) {
            if (variation === cleanedTarget) return true;
        }

        return false;
    }

    function loadQuestion() {
        const imgElement = document.getElementById('question-img');
        const tracker = document.getElementById('q-tracker');
        const feedback = document.getElementById('feedback');
        const input = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');
        const choicesContainer = document.getElementById('choices-container');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        // Load image
        imgElement.src = `https://drive.google.com/thumbnail?id=${imageIds[currentIndex]}&sz=w1000`;
        tracker.innerText = `Question ${currentIndex + 1} of 57`;
        document.getElementById('progress').innerText = `Question ${currentIndex + 1} / 57`;
        
        input.value = "";
        selectedChoice = null;
        feedback.style.display = "none";
        choicesContainer.innerHTML = "";

        // Determine if question type has been answered
        if (currentIndex in userResults) {
            input.disabled = true;
            submitBtn.disabled = true;
            feedback.style.display = "block";

            const wasCorrect = userResults[currentIndex];
            if (wasCorrect) {
                feedback.classList.remove('feedback-incorrect');
                feedback.classList.add('feedback-correct');
                feedback.innerHTML = `<strong>✨ Correct!</strong><br><span class="rationale-text"><strong>Rationale:</strong> ${rationales[currentIndex]}</span>`;
            } else {
                feedback.classList.remove('feedback-correct');
                feedback.classList.add('feedback-incorrect');
                feedback.innerHTML = `<strong>❌ Incorrect</strong><br><strong>Correct Answer:</strong> ${correctAnswers[currentIndex]}<br><span class="rationale-text"><strong>Rationale:</strong> ${rationales[currentIndex]}</span>`;
            }

            choicesContainer.style.display = "none";
        } else {
            input.disabled = false;
            submitBtn.disabled = false;

            // Show choice buttons if multiple choice question
            if (questionTypes[currentIndex] === 0) {
                choicesContainer.style.display = "grid";
                const choices = ['A', 'B', 'C', 'D'];
                for (let choice of choices) {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.textContent = choice;
                    btn.onclick = () => selectChoice(choice, btn);
                    choicesContainer.appendChild(btn);
                }
                input.style.display = "none";
            } else {
                choicesContainer.style.display = "none";
                input.style.display = "block";
                input.focus();
            }
        }

        // Update nav buttons
        prevBtn.disabled = currentIndex === 0;
        nextBtn.disabled = currentIndex === 56;
    }

    function selectChoice(choice, element) {
        if (currentIndex in userResults) return;
        
        const allChoices = document.querySelectorAll('.choice-btn');
        allChoices.forEach(btn => btn.classList.remove('selected'));
        element.classList.add('selected');
        selectedChoice = choice;
    }

    function checkAnswer() {
        if (currentIndex in userResults) return;

        let userRaw, targetRaw;
        const feedback = document.getElementById('feedback');
        const input = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');

        // Get user answer (from choice or text input)
        if (questionTypes[currentIndex] === 0) {
            if (!selectedChoice) {
                alert("Please select a choice (A, B, C, or D)");
                return;
            }
            userRaw = selectedChoice;
            targetRaw = correctAnswers[currentIndex];
        } else {
            userRaw = input.value.trim();
            if (!userRaw) {
                alert("Please enter an answer");
                return;
            }
            targetRaw = correctAnswers[currentIndex];
        }

        feedback.style.display = "block";
        let isCorrect = false;

        // For multiple choice: compare first letter
        if (questionTypes[currentIndex] === 0) {
            let targetLetters = targetRaw.toUpperCase().match(/[A-D]/g) || [];
            isCorrect = targetLetters.includes(userRaw.toUpperCase());
        } else {
            // For text: use flexible matching
            isCorrect = checkTextAnswer(userRaw, targetRaw);
        }

        if (isCorrect) {
            userResults[currentIndex] = true;
            score++;
            updateScore();
            feedback.classList.remove('feedback-incorrect');
            feedback.classList.add('feedback-correct');
            feedback.innerHTML = `<strong>✨ Correct!</strong><br><span class="rationale-text"><strong>Rationale:</strong> ${rationales[currentIndex]}</span>`;
            input.disabled = true;
            submitBtn.disabled = true;
            setTimeout(() => { nextQ(); }, 1500);
        } else {
            userResults[currentIndex] = false;
            feedback.classList.remove('feedback-correct');
            feedback.classList.add('feedback-incorrect');
            feedback.innerHTML = `<strong>❌ Incorrect</strong><br><strong>Correct Answer:</strong> ${correctAnswers[currentIndex]}<br><span class="rationale-text"><strong>Rationale:</strong> ${rationales[currentIndex]}</span>`;
            input.disabled = true;
            submitBtn.disabled = true;
        }
    }

    function updateScore() { 
        document.getElementById('score').innerText = `Score: ${score} / 57`; 
    }
    
    function nextQ() { 
        if (currentIndex < 56) { 
            currentIndex++; 
            loadQuestion(); 
        } else { 
            alert(`Quiz Complete! Final Score: ${score} / 57`); 
        } 
    }
    
    function prevQ() { 
        if (currentIndex > 0) { 
            currentIndex--; 
            loadQuestion(); 
        } 
    }

    // Initialize
    loadQuestion();
</script>

</body>
</html>
